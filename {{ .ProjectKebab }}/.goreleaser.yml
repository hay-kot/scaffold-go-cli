# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com
version: 2
before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm
      - arm64
    goarm:
      - "7"

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of uname.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(\w+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(\w+\))??!?:.+$'
      order: 1
    - title: Documentation
      regexp: '^.*?docs(\(\w+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^chore:"
      - "^ci:"

[[ if .Computed.feature_homebrew_tap ]]
homebrew_casks:
  - repository:
      owner: "[[ .Scaffold.homebrew_owner ]]"
      name: "[[ .Scaffold.homebrew_name ]]"
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    description: "[[ .Scaffold.description ]]"
    homepage: "https://[[ .Scaffold.gomod ]]"
    dependencies:
      - formula: go
      - formula: git
[[ end ]]

[[ if .Computed.feature_docker ]]
dockers_v2:
  - images:
      - "[[ .Scaffold.docker_registry_url ]]"
    tags:
      - "v{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
    annotations:
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "v{{ .Version }}"
[[ end ]]

